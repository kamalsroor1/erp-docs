<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إبراء ERP - إنشاء حساب جديد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #020617; color: #FFFFFF; }
        .glass-card { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 2px solid rgba(30, 41, 59, 0.7); }
        .emerald-gradient { background: linear-gradient(135deg, #10B981 0%, #059669 100%); }
    </style>
</head>
<body class="p-6 md:p-16 min-h-screen flex items-center justify-center relative overflow-x-hidden">

    <div class="absolute bottom-0 left-0 w-[600px] h-[600px] bg-blue-500/10 rounded-full blur-[150px] -ml-64 -mb-64"></div>

    <div id="app" class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-12 gap-16 items-center z-10">
        <!-- المحتوى التعريفي -->
        <div class="lg:col-span-5 space-y-10">
            <div class="flex items-center space-x-4 space-x-reverse mb-8">
                <img src="../Gemini_Generated_Image_44ih5844ih5844ih Whait.png" alt="Logo" class="h-16 w-auto">
                <span class="text-4xl font-black text-white italic tracking-tighter">إبراء<span class="text-emerald-500">.</span></span>
            </div>
            <h1 class="text-6xl font-black text-white leading-tight italic tracking-tighter">ابدأ الآن <span class="text-emerald-500 underline decoration-8 underline-offset-[12px]">بشكل احترافي</span></h1>
            <p class="text-slate-400 font-bold text-2xl italic leading-relaxed">أدخل بيانات متجرك الآن لتفعيل نظام الإدارة الأسهل والأقوى في مصر.</p>
            
            <div class="glass-card p-10 rounded-[50px] border-emerald-500/30 shadow-2xl">
                <p class="text-xs font-black text-slate-500 uppercase tracking-[4px] mb-4 italic">لقد اخترت باقة:</p>
                <div class="flex justify-between items-center">
                    <h3 class="text-3xl font-black text-white italic tracking-tighter">{{ selectedPlan.name }}</h3>
                    <span class="text-3xl font-black text-emerald-500 tracking-tighter">{{ selectedPlan.monthlyPrice }} ج.م</span>
                </div>
            </div>
        </div>

        <!-- نموذج التسجيل -->
        <div class="lg:col-span-7">
            <div class="glass-card p-12 md:p-16 rounded-[60px] shadow-3xl">
                <h2 class="text-3xl font-black text-white mb-12 border-b-2 border-slate-800 pb-8 italic tracking-tighter">إعداد بيانات المتجر</h2>
                
                <form @submit.prevent="submitForm" class="space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-3">
                            <label class="text-xs font-black text-slate-500 uppercase tracking-widest mr-2 italic">اسم المتجر</label>
                            <input v-model="form.storeName" type="text" placeholder="شركة كمال للإلكترونيات" class="w-full bg-slate-900 border-2 border-slate-800 rounded-[30px] py-5 px-8 text-xl font-black text-white outline-none focus:border-emerald-500 transition shadow-inner">
                        </div>
                        <div class="space-y-3">
                            <label class="text-xs font-black text-slate-500 uppercase tracking-widest mr-2 italic">اسم المالك</label>
                            <input v-model="form.ownerName" type="text" placeholder="الاسم الكامل" class="w-full bg-slate-900 border-2 border-slate-800 rounded-[30px] py-5 px-8 text-xl font-black text-white outline-none focus:border-emerald-500 transition shadow-inner">
                        </div>
                    </div>

                    <div class="space-y-3">
                        <label class="text-xs font-black text-slate-500 uppercase tracking-widest mr-2 italic">رابط المتجر (Subdomain)</label>
                        <div class="flex items-center relative">
                            <input v-model="form.subdomain" type="text" placeholder="my-store" class="w-full bg-slate-900 border-2 border-slate-800 rounded-[30px] py-5 pr-8 pl-40 text-2xl font-black text-white outline-none focus:border-emerald-500 transition text-left ltr tracking-widest">
                            <div class="absolute left-6 text-sm font-black text-slate-500 tracking-widest">.ebraa-erp.com</div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-3">
                            <label class="text-xs font-black text-slate-500 uppercase tracking-widest mr-2 italic">البريد الإلكتروني</label>
                            <input v-model="form.email" type="email" placeholder="name@example.com" class="w-full bg-slate-900 border-2 border-slate-800 rounded-[30px] py-5 px-8 text-xl font-black text-white outline-none focus:border-emerald-500 transition shadow-inner">
                        </div>
                        <div class="space-y-3">
                            <label class="text-xs font-black text-slate-500 uppercase tracking-widest mr-2 italic">رقم الموبايل</label>
                            <input v-model="form.phone" type="text" placeholder="01xxxxxxxxx" class="w-full bg-slate-900 border-2 border-slate-800 rounded-[30px] py-5 px-8 text-xl font-black text-white outline-none focus:border-emerald-500 transition shadow-inner">
                        </div>
                    </div>

                    <div class="pt-8">
                        <button type="submit" :disabled="loading" class="w-full emerald-gradient text-white py-8 rounded-[40px] font-black text-3xl shadow-3xl shadow-emerald-900/50 hover:scale-[1.02] active:scale-95 transition-all">
                            <span v-if="!loading">تفعيل حسابي الآن 🚀</span>
                            <div v-else class="h-10 w-10 border-4 border-white/30 border-t-white rounded-full animate-spin mx-auto"></div>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        createApp({
            setup() {
                const loading = ref(false);
                const selectedPlan = ref({ name: 'الباقة الاحترافية', monthlyPrice: '850' });
                const form = ref({ storeName: '', ownerName: '', subdomain: '', email: '', phone: '' });

                const submitForm = () => {
                    loading.value = true;
                    setTimeout(() => {
                        loading.value = false;
                        Swal.fire({
                            title: 'تم إنشاء متجرك بنجاح! 🎊',
                            text: `جاري تحضير رابط ${form.value.subdomain}.ebraa-erp.com.. ستصلك رسالة عبر تليجرام فور الانتهاء.`,
                            icon: 'success',
                            background: '#0F172A',
                            color: '#FFFFFF',
                            confirmButtonColor: '#10B981',
                        }).then(() => window.location.href = 'index.html');
                    }, 2000);
                };

                onMounted(() => {
                    lucide.createIcons();
                    const saved = localStorage.getItem('selectedPlan');
                    if (saved) selectedPlan.value = JSON.parse(saved);
                });

                return { form, loading, selectedPlan, submitForm };
            }
        }).mount('#app');
    </script>
</body>
</html>
